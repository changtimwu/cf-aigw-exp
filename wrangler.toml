name = "cf-aigw-exp-worker"
main = "src/worker/index.ts"
compatibility_date = "2026-04-28"

# Non-secret config. Secrets (CF_AIGW_TOKEN, ADMIN_TOKEN) live in .dev.vars
# for local development and `wrangler secret put` for production.
[vars]
CF_ACCOUNT_ID = "15bfe332876061d9a548a4f3d6835657"
CF_AIGW_ID = "aigw-exp-poc"

# Workers KV namespace for per-user records.
# Local dev (`wrangler dev`) uses a local KV store and ignores `id` content,
# so any placeholder works locally. Before `wrangler deploy`, run:
#     wrangler kv namespace create USERS
# and replace the id below with the one wrangler prints.
[[kv_namespaces]]
binding = "USERS"
id = "PLACEHOLDER_REPLACE_BEFORE_DEPLOY"

[dev]
port = 8787
local_protocol = "http"
